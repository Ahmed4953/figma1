<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Requests — mark correct · nyris Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Requests list — mark correct confirmation (Builder.io capture)" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&family=Fira+Sans:wght@600;700&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="prompts-screens.css" />
  <link rel="stylesheet" href="prompt-app.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <style>
    html, body { margin: 0; padding: 0; background: rgb(221, 222, 231); min-height: 100vh; }
    #root { display: flex; min-height: 100vh; }
    #root > .pl { width: 100%; }
    .pl-menu, .pl-bar { background: rgb(30, 31, 49) !important; }
    .pl-sidebar {
      background: linear-gradient(180deg, rgb(43, 44, 70) 17%, rgb(113, 20, 230) 100%) !important;
    }
    .pl-nav { color: rgb(255, 255, 255) !important; }
    .pl-nav.is-active { background: rgba(255, 255, 255, 0.14) !important; }
    .pl-divider { color: rgb(151, 69, 255) !important; }
    .pl-email { color: rgb(255, 255, 255) !important; }
  </style>
  <script>
    (function () {
      window.__NYRIS_SHOW_PRERENDER__ = true;
      window.__NYRIS_OPEN_MARK_CORRECT__ = true;
      window.__NYRIS_MARK_CORRECT_REQUEST_ID__ = "req-demo-1";
      window.__NYRIS_MARK_CORRECT_RESULT_INDEX__ = 1;
      window.location.hash = "#/requests/mark-correct/req-demo-1/MT-CPL-002";
    })();
  </script>
</head>
<body>
  <div id="root">
    <div id="nyris-prerender" class="pl nyris-prerender">
      <header class="pl-header">
        <div class="pl-menu" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M4 4L14 14M14 4L4 14" stroke="white" stroke-width="1.8" stroke-linecap="round"/></svg>
        </div>
        <div class="pl-bar">
          <div class="pl-left">
            <img class="pl-logo" src="assets/PORTAL.svg" alt="PORTAL" />
            <div class="pl-search"><span class="label">All accounts</span></div>
          </div>
          <div class="pl-right">
            <span class="pl-email">test@nyris.io</span>
            <div class="pl-avatar">T</div>
          </div>
        </div>
      </header>
      <div class="pl-shell">
        <div class="pl-sidebar-wrap">
          <aside class="pl-sidebar">
            <div class="pl-nav-group">
              <div class="pl-nav"><img src="assets/icon-dashboard.svg" alt="" />Dashboard</div>
              <div class="pl-divider">Admin Hub</div>
              <div class="pl-nav"><img src="assets/icon-accounts.svg" alt="" />Accounts</div>
              <div class="pl-nav"><img src="assets/icon-indexes.svg" alt="" />Indexes</div>
              <div class="pl-nav"><img src="assets/icon-prompts.svg" alt="" />Prompts</div>
              <div class="pl-divider">Catalogue</div>
              <div class="pl-nav is-active"><img src="assets/icon-requests.svg" alt="" />Requests</div>
              <div class="pl-nav"><img src="assets/icon-items.svg" alt="" />Items</div>
            </div>
            <div class="pl-foot"><img src="assets/poweredby-nyris.svg" alt="Powered by nyris" /></div>
          </aside>
        </div>
        <main class="pl-content">
          <div class="pl-panel pl-panel--requests">
            <div class="req-page">
              <h1 class="req-title">Requests</h1>
              <p class="req-subtitle">Image search request log</p>
              <div class="req-list-card">
                <div class="req-list">
                  <article class="req-row">
                    <div class="req-row-query">
                      <img src="assets/requests/query-coupling.jpg" alt="Query" />
                    </div>
                    <div class="req-row-body">
                      <div class="req-row-top">
                        <div class="req-row-meta">
                          <span>27/09/21, 14:35</span>
                          <span class="req-row-meta-sep" aria-hidden="true"></span>
                          <span>1805.1 ms</span>
                          <span class="req-row-meta-sep" aria-hidden="true"></span>
                          <span>Feedback <strong>Positive</strong></span>
                        </div>
                        <div class="req-row-actions">
                          <span class="req-icon-btn" aria-hidden="true"></span>
                          <span class="req-icon-btn" aria-hidden="true"></span>
                          <span class="req-icon-btn" aria-hidden="true"></span>
                        </div>
                      </div>
                      <div class="req-row-results-block">
                        <div class="req-row-results req-row-results--compact">
                          <span class="req-thumb req-thumb--list"><img src="assets/requests/r1.jpg" alt="" /></span>
                          <span class="req-thumb req-thumb--list" style="border-color: var(--purple); box-shadow: 0 0 0 2px var(--purple-100);"><img src="assets/requests/r2.jpg" alt="" /></span>
                          <span class="req-thumb req-thumb--list"><img src="assets/requests/r3.jpg" alt="" /></span>
                          <span class="req-thumb req-thumb--list"><img src="assets/requests/r4.jpg" alt="" /></span>
                        </div>
                        <div class="req-row-mark-bar" role="region" aria-label="Mark correct result">
                          <span class="req-row-mark-bar-preview">
                            <img src="assets/requests/r2.jpg" alt="" />
                          </span>
                          <span class="req-row-mark-bar-label">Mark as correct?</span>
                          <div class="req-row-mark-bar-actions">
                            <button type="button" class="req-row-mark-cancel">Cancel</button>
                            <button type="button" class="req-row-mark-confirm">Mark correct</button>
                          </div>
                        </div>
                      </div>
                    </div>
                  </article>
                </div>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>
  </div>

  <script type="text/babel" src="portal-chrome.jsx"></script>
  <script type="text/babel" src="prompt-app-core.jsx"></script>
  <script type="text/babel" src="prompt-versioning.jsx"></script>
  <script type="text/babel" src="prompt-app-screens.jsx"></script>
  <script type="text/babel" src="requests-screens.jsx"></script>
  <script type="text/babel" src="prompt-app-wizard.jsx"></script>
  <script type="text/babel" src="prompt-app-features.jsx"></script>
  <script type="text/babel" data-presets="react">
    function bootRequestsMarkCorrect() {
      if (!window.PromptApp || !window.RequestsPage) {
        requestAnimationFrame(bootRequestsMarkCorrect);
        return;
      }
      ReactDOM.createRoot(document.getElementById("root")).render(
        React.createElement(window.PromptApp)
      );
    }
    bootRequestsMarkCorrect();
  </script>
</body>
</html>
