<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Prompts Library — Inside Views</title>
  <meta name="viewport" content="width=1440" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&family=Fira+Sans:wght@600;700&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="prompts-screens.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    html, body { margin: 0; padding: 0; background: #ebe9e2; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="portal-chrome.jsx"></script>
  <script type="text/babel" src="prompts-screens.jsx"></script>
  <script type="text/babel" data-presets="react">
    function App() {
      return (
        <DesignCanvas>
          <DCSection id="library-flow" title="Prompts Library — Inside Views" subtitle="Detail, create flow, empty, filtered, and mobile">
            <DCArtboard id="detail" label="01 · Prompt Detail View" width={1200} height={960} data-screen-label="01 Detail View">
              <DetailScreen />
            </DCArtboard>

            <DCArtboard id="create" label="02 · Create Customer Prompt" width={1200} height={960} data-screen-label="02 Create Customer Prompt">
              <CreateModalScreen />
            </DCArtboard>

            <DCArtboard id="empty" label="03 · Empty State" width={1200} height={960} data-screen-label="03 Empty State">
              <EmptyScreen />
            </DCArtboard>

            <DCArtboard id="filtered" label="04 · Filter Active (Hybrid)" width={1200} height={960} data-screen-label="04 Filter Active">
              <FilterActiveScreen />
            </DCArtboard>

            <DCArtboard id="mobile" label="05 · Mobile" width={390} height={844} data-screen-label="05 Mobile">
              <MobileScreen />
            </DCArtboard>

            <DCArtboard id="improve" label="06 · Improve Prompt with AI" width={1200} height={960} data-screen-label="06 Improve Prompt with AI">
              <ImproveModalScreen />
            </DCArtboard>

            <DCArtboard id="improving" label="07 · Improving Prompt (loading)" width={1200} height={960} data-screen-label="07 Improving Prompt">
              <ImprovingLoadingScreen />
            </DCArtboard>

            <DCArtboard id="test" label="08 · Test Prompt" width={1200} height={1100} data-screen-label="08 Test Prompt">
              <TestPromptScreen />
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
