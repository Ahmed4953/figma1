<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Customer prompt sections · nyris Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Customer prompt creation — prompt sections step (Builder.io capture)" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&family=Fira+Sans:wght@600;700&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="prompts-screens.css" />
  <link rel="stylesheet" href="prompt-app.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    html, body { margin: 0; padding: 0; background: rgb(221, 222, 231); min-height: 100vh; }
    #root { display: flex; min-height: 100vh; }
    #root > .pl { width: 100%; }
    .pl-menu, .pl-bar { background: rgb(30, 31, 49) !important; }
    .pl-sidebar {
      background: linear-gradient(180deg, rgb(43, 44, 70) 17%, rgb(113, 20, 230) 100%) !important;
    }
    .pl-nav { color: rgb(255, 255, 255) !important; }
    .pl-divider { color: rgb(151, 69, 255) !important; }
    .pl-email { color: rgb(255, 255, 255) !important; }
  </style>
  <script>
    (function () {
      var hash = window.location.hash || "";
      if (!hash || hash === "#") {
        window.location.hash = "#/builder-prompt-sections/hybrid-search";
      }
      window.__NYRIS_SHOW_PRERENDER__ = true;
    })();
  </script>
</head>
<body>
  <div id="root">
    <div id="nyris-prerender" class="pl nyris-prerender">
      <div class="pl-shell">
        <main class="pl-content">
          <div class="cpw cpw--prompt-sections">
            <p class="det-back cpw-cancel">Back</p>
            <div class="cpw-head">
              <div class="cpw-eyebrow">Customer prompt creation</div>
              <h1 class="cpw-title">Hybrid Search – Custom</h1>
            </div>
            <ol class="cpw-stepper" aria-label="Creation progress">
              <li class="cpw-step is-done">
                <span class="cpw-step-marker" aria-hidden="true">
                  <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2.5 6.2L4.8 8.5L9.5 3.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </span>
                <span class="cpw-step-label">Select Base</span>
                <span class="cpw-step-line" aria-hidden="true"></span>
              </li>
              <li class="cpw-step is-done">
                <span class="cpw-step-marker" aria-hidden="true">
                  <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2.5 6.2L4.8 8.5L9.5 3.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </span>
                <span class="cpw-step-label">Review</span>
                <span class="cpw-step-line" aria-hidden="true"></span>
              </li>
              <li class="cpw-step is-done">
                <span class="cpw-step-marker" aria-hidden="true">
                  <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2.5 6.2L4.8 8.5L9.5 3.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </span>
                <span class="cpw-step-label">Metadata</span>
                <span class="cpw-step-line" aria-hidden="true"></span>
              </li>
              <li class="cpw-step is-active">
                <span class="cpw-step-marker" aria-hidden="true">4</span>
                <span class="cpw-step-label">Prompt Sections</span>
                <span class="cpw-step-line" aria-hidden="true"></span>
              </li>
              <li class="cpw-step">
                <span class="cpw-step-marker" aria-hidden="true">5</span>
                <span class="cpw-step-label">Generate</span>
              </li>
            </ol>
            <div class="cpw-card cpw-card--prompt-sections">
              <h2 class="cpw-panel-title">Prompt sections</h2>
              <p class="cpw-panel-lead">Customize each editable section for this customer prompt. Locked sections and the output schema cannot be changed.</p>
              <div class="cpw-prompt-sections-block">
                <div class="cpw-prompt-sections-head">Prompt sections</div>
                <div class="cpw-sections">
                  <div class="cpw-section-field">
                    <label class="field-label">Visual classification</label>
                    <textarea class="field-textarea" placeholder="Define when an image signal is primary vs secondary for this account's catalogue."></textarea>
                  </div>
                  <div class="cpw-section-field">
                    <label class="field-label">OCR text classification</label>
                    <textarea class="field-textarea" placeholder="Rules for primary, secondary, or not-relevant OCR text on nameplates and labels."></textarea>
                  </div>
                  <div class="cpw-section-field">
                    <label class="field-label">BM25 query construction</label>
                    <textarea class="field-textarea" placeholder="Concise catalog query rules, token limits, and 1–2 worked examples."></textarea>
                  </div>
                  <div class="cpw-section-field">
                    <label class="field-label">Specification extraction</label>
                    <textarea class="field-textarea" placeholder="Fixed keys to extract (e.g. VIN, tire size, thread) and how to normalize them."></textarea>
                  </div>
                  <div class="cpw-section-field">
                    <label class="field-label">Custom context</label>
                    <textarea class="field-textarea" placeholder="Optional customer-specific context, terminology, or extra constraints."></textarea>
                  </div>
                </div>
              </div>
              <div class="cpw-foot">
                <button type="button" class="btn btn--primary" style="flex: 0 0 auto; min-width: 140px; margin-left: auto;">Next: Generate</button>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>
  </div>

  <script type="text/babel" src="portal-chrome.jsx"></script>
  <script type="text/babel" src="prompt-app-core.jsx"></script>
  <script type="text/babel" src="prompt-app-screens.jsx"></script>
  <script type="text/babel" src="prompt-app-wizard.jsx"></script>
  <script type="text/babel" src="prompt-app-features.jsx"></script>
  <script type="text/babel" data-presets="react">
    ReactDOM.createRoot(document.getElementById('root')).render(<PromptApp />);
  </script>
</body>
</html>
